<!DOCTYPE html>
<html>
<head>
    <title>The Archive</title>
    <link rel="stylesheet" href="index/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+25&family=Petit+Formal+Script&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="room_index">
        <!--Laptop_Screen-->
        
        <div id="laptop_screen">
            <img id="wallpaper" src = "index/index_img/wallpaper.png" class="pages">

            <div id="Movie_App-container">
            <!--Watch Log-->
                <div id="movie_app">
                    <img id="movie_icon" src="index/index_img/Movie_icon.png">
                    <p class="app_font">Watch Log</p>
                </div>
                
                <div id="inside" class="pages">

                    <div id="top_bar">
                        <div id="left">
                            <img id="small_icon" src="index/index_img/Movie_icon.png">
                            <p>Watch Log - </p>
                            <div id ="path">
                                

                                <!--Objects Created-->
                            </div>
                            
                        </div>

                        <div id="right">
                            <p>•••</p>
                            <div id="minimize"></div>
                            <div id="close"></div>
                        </div>
                    </div>

                    <div id="main_content">
                        <div id="sidebar_closed">
                            <p id="expand">></p>
                            <div id="movies" class="button">
                                <p></p>
                            </div>
                            
                            
                            <div id="shows" class="button">
                                <p></p>
                            </div> 
                            <div id="anime" class="button">
                                <p></p>
                            </div>      
                        </div>
                        <div class="sidebar_dim">

                        
                        <div class="movie_container film_containers">

                            <div class="search_container">
                                <div class="search_icon"></div>
                                <input type="text" class="search_bar" placeholder="Search movies..." autocomplete="off">
                                
                            </div>
                                <div class = "movie_grid grids">
                                    <!--Objects created-->    
                                </div>
                                
                        </div>
                        <div class = "movie_indiv indivs">
                            <!--Objects created-->
                        </div>

                        <div class="shows_container film_containers">

                            <div class="search_container">
                                <div class="search_icon"></div>
                                <input type="text" class="search_bar" placeholder="Search movies..." autocomplete="off">
                            
                            </div>
                                <div class = "shows_grid grids">
                                    <!--Objects created-->    
                                </div>
                            
                        </div>
                        <div class = "shows_indiv indivs">
                            <!--Objects created-->
                        </div>
                        
                        <div class = "anime_container film_containers">

                            <div class="search_container">
                                <div class="search_icon"></div>
                                <input type="text" class="search_bar" placeholder="Search movies..." autocomplete="off">
                            
                            </div>
                                <div class = "anime_grid grids">
                                    <!--Objects created-->    
                                </div>
                        </div>
                        <div class = "anime_indiv indivs">
                            <!--Objects created-->
                        </div>
                        </div>
                    </div>
                     
                </div>
            </div>
            
            
        </div>        
        <div id="background">
            <div class="room">
            <!--Table link-->
            <a href="https://www.google.com" target="_blank">
                <img id= "transparent_table" src="index/index_img/table.png">
                <img id= "table" src="index/index_img/table.png">
            </a>
            <!--Shelf link-->
            <a href="https://www.google.com" target="_blank">
                <img id="shelf" src="index/index_img/shelf.png" class="objects">
            </a>
            <!--Bed link-->
            <a href="https://www.google.com" target="_blank">
                <!--add bed link here later-->
            </a>
                <img id="bed" src="index/index_img/bed.png">
                <img id="bed_made" src="index/index_img/bed_made.png">
            <!--Bedside table link-->
            <a href="https://www.google.com" target="_blank">
                <img id="bedside_table" src="index/index_img/beside table.png" class="objects">
                <img id="bedside_table2" src="index/index_img/beside table.png" class="objects">
            </a>
            <!--Closet_side table link-->
            <a href="https://www.google.com" target="_blank">
                <img id="closet_side" src="index/index_img/closet_side.png" class="objects">
            </a>
            <!--Laptop_small-->
            <img id="laptop" src="index/index_img/laptop.png">
            <img id="laptop_on" src="index/index_img/laptop_on.png">
            <img id="laptop_on_dark" src="index/index_img/laptop_on_dark (1).png">

            <!--Mouse_link-->
            <div id="mouse_link">
                <img id="mouse" src="index/index_img/mouse.png">
            </div>
            <!--Window-->
            <img id="curtain_closed" src="index/index_img/Curtain_closed.PNG">

            <img id="morning" src="index/index_img/morning.png" class="window">
            <img id="afternoon" src="index/index_img/afternoon.png" class="window">
            <img id="evening" src="index/index_img/evening.png" class="window">
            <img id="night" src="index/index_img/night.png" class="window">
            <!--Fan-->
            <img id="fan_spin" src="index/index_img/fan_spin1.png">
            <img id="fan" src="index/index_img/fan_spin2.PNG">
            <img id="fan_switch_on" src="index/index_img/switch_on.png" class="switches">
            <img id="fan_switch_off" src="index/index_img/switch_off.png" class="switches">

            <a href="birthday.html" target="_blank">
            <img id="calender" src="index/index_img/Calender.png" class="objects">
            </a>

            <!--Dark mode-->
            <div id="dark_mode"></div>
                <img id="switch_on" src="index/index_img/switch_on.png" class="switches">
                <img id="switch_off" src="index/index_img/switch_off.png" class="switches">
                <div id="laptop_light"></div>
            </div>
        </div>
    </div>
    

<script src="index/index.js"></script>
</body>
</html>
